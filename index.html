<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled README</title>
    <style>
        body {
            background-color: #800080; /* Purple background */
            color: white; /* White text for readability */
            font-family: Arial, sans-serif; /* Clean font */
            margin: 0;
            padding: 20px;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        h1, h2, h3 {
            color: white; /* Ensure headings are visible */
        }

        .readme-content {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.1); /* Slight transparent background */
            border-radius: 10px;
            white-space: pre-wrap; /* Preserve line breaks */
        }
    </style>
</head>
<body>

<h1>💻 My Tech Stack README</h1>

<!-- The README content will be dynamically loaded here -->
<div class="readme-content" id="readme-content">
    <!-- Markdown content will be inserted here by JavaScript -->
</div>

<script>
    // Function to fetch and display the README.md content
    fetch('README.md')  // Fetch the README.md file from the same directory
        .then(response => response.text())
        .then(data => {
            // Insert the README content into the page
            document.getElementById('readme-content').innerText = data;
        })
        .catch(error => console.error('Error loading README.md:', error));
</script>

</body>
</html>
